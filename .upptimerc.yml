owner: K12-Analytics-Engineering
repo: kai-status

sites:
  - name: Kai
    url: https://askkai.org

status-website:
  cname: status.askkai.org
  name: Kai Status
  logoUrl: https://k12analyticsengineering.dev/assets/images/logo.jpg
  favicon: https://k12analyticsengineering.dev/assets/images/logo.jpg
  theme: light
  introTitle: "**[Kai](https://askkai.org)** system status"
  introMessage: "This page provides real-time uptime and incident information for [Kai](https://askkai.org), built by [K12 Analytics Engineering](https://k12analyticsengineering.dev)."
  navbar:
    - title: Status
      href: /
    - title: Kai
      href: https://askkai.org
    - title: K12 Analytics Engineering
      href: https://k12analyticsengineering.dev
  customHeadHtml: >-
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  css: >-
    :root {
      --body-background-color: #faf6f0;
      --body-text-color: #1e1612;
      --card-background-color: #f2ebe0;
      --nav-background-color: #1e1612;
    }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background-color: #faf6f0;
      color: #1e1612;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Fraunces', Georgia, serif;
    }
    nav, .navbar, header {
      background-color: #1e1612 !important;
    }
    a {
      color: #c1623f;
    }
    a:hover {
      color: #9e4a2d;
    }
    .card, .rounded, [class*="card"] {
      background-color: #f2ebe0;
      border-color: #e8d9c4;
    }
    .tag.is-success, .badge-success, [class*="success"] {
      background-color: #5a7a5e !important;
    }
    .tag.is-danger, .badge-danger, [class*="danger"] {
      background-color: #b91c1c !important;
    }
    .button.is-primary, .btn-primary, [class*="primary"] {
      background-color: #c1623f !important;
      border-color: #c1623f !important;
    }

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
